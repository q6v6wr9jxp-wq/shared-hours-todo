<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vocabula</title>
    <link rel="icon" href="./assets/app-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card" aria-label="vocabula">
        <img class="hero-image" src="./assets/hero-blurred.png" alt="" />
        <div class="hero-brand">
          <img src="./assets/app-icon.png" alt="" />
          <h1>vocabula</h1>
        </div>
      </section>

      <section class="people-grid" id="peopleGrid" aria-label="Member local times"></section>

      <section class="todo-panel" aria-label="Todo list">
        <div class="todo-head">
          <h1>Todo</h1>
        </div>

        <form class="todo-form" id="todoForm">
          <input id="todoInput" name="todo" type="text" autocomplete="off" placeholder="Add todo" />
          <button type="submit" aria-label="Add todo">+</button>
        </form>

        <ul class="todo-list" id="todoList"></ul>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
